name: Checks
description: 'Run format, lint, type check, and build checks.'

runs:
  using: 'composite'
  steps:
    - name: 'Setup Node.js'
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'

    - name: '🐰 Setup Bun'
      uses: oven-sh/setup-bun@main
      with:
        bun-version: latest

    - name: 'Install Dependencies'
      shell: bash
      run: bun install --frozen-lockfile

    - name: 'Format & Lint & Type Check'
      shell: bash
      run: |
        bun --bun oxfmt --config oxfmt.config.ts . --check
        bun --bun oxlint \
          --config='oxlint.config.ts' \
          --type-check \
          --type-aware \
          --max-warnings=0 \
          --report-unused-disable-directives \
          --format='github'
        bun tsgo --project tsconfig.json --noEmit

    - name: 'Build'
      shell: bash
      run: bun vite --mode='production' --config='vite.config.ts' build

    - name: 'Test'
      shell: bash
      run: bun vitest --run
