#:schema https://mise.en.dev/schema/mise.json

[settings]
color = true
experimental = true
color_theme = "charm"
minimum_release_age_excludes = ["hk", "pkl", "npm:oxfmt", "npm:oxlint"]

[env]
HK_MISE = 1
WRANGLER_SEND_METRICS = false
NODE_OPTIONS = "--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning"

[tools]
fd = "latest"
hk = "latest"
pkl = "latest"
bun = "latest"
node = "latest"
tombi = "latest"
usage = "latest"
shfmt = "latest"
gitleaks = "latest"
shellcheck = "latest"
actionlint = "latest"
betterleaks = "latest"
"npm:oxfmt" = "latest"
"npm:oxlint" = "latest"
ghalint = "latest"

[hooks]
postinstall = "hk install --mise"

[tasks.check]
description = "format & lint files"
run = "hk fix --all"

[tasks.build]
description = "build TS project"
run = 'bun vite build --mode="production" --config="vite.config.ts"'

[tasks.test]
description = "(vi)test TS project"
run = 'bun vitest --config="vitest.config.ts" --run'

[tasks.typecheck]
description = "type check JS/TS files"
run = "bun tsgo --project tsconfig.json --noEmit"

[tasks.ci]
description = "run CI tasks"
depends = ["format", "lint", "build", "test", "typecheck"]
